name: Publish CLI

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: ./cli
        run: bun install

      - name: Build
        working-directory: ./cli
        run: bun run build

      - name: Publish to NPM
        working-directory: ./cli
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish -p --access public
