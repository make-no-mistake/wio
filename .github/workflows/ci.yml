name: CI

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  test:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/ci'
    runs-on: self-hosted
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Pick random ports
        id: ports
        run: |
          POSTGRES_PORT=$(shuf -i 10000-60000 -n 1)
          MINIO_PORT=$(shuf -i 10000-60000 -n 1)
          while [ "$MINIO_PORT" -eq "$POSTGRES_PORT" ]; do
            MINIO_PORT=$(shuf -i 10000-60000 -n 1)
          done
          WEB_PORT=$(shuf -i 10000-60000 -n 1)
          while [ "$WEB_PORT" -eq "$POSTGRES_PORT" ] || [ "$WEB_PORT" -eq "$MINIO_PORT" ]; do
            WEB_PORT=$(shuf -i 10000-60000 -n 1)
          done
          echo "postgres=$POSTGRES_PORT" >> $GITHUB_OUTPUT
          echo "minio=$MINIO_PORT" >> $GITHUB_OUTPUT
          echo "web=$WEB_PORT" >> $GITHUB_OUTPUT
          echo "Using POSTGRES_PORT=$POSTGRES_PORT, MINIO_PORT=$MINIO_PORT, WEB_PORT=$WEB_PORT"

      - name: Get PR HEAD SHA
        id: pr
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set commit status to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: 'CI / test (chatops)',
              description: 'Running tests...',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Start PostgreSQL
        run: |
          docker run --detach -p ${{ steps.ports.outputs.postgres }}:5432 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=wio_test \
            postgres:16
          for i in $(seq 1 30); do
            pg_isready -h localhost -p ${{ steps.ports.outputs.postgres }} && break
            sleep 1
          done

      - name: Start MinIO
        run: |
          docker run --detach -p ${{ steps.ports.outputs.minio }}:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:edge-cicd server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:${{ steps.ports.outputs.minio }}/minio/health/live && break
            sleep 1
          done

      - name: Create MinIO bucket
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc alias set local http://localhost:${{ steps.ports.outputs.minio }} minioadmin minioadmin
          mc mb local/wio-assets

      - name: Run tests
        run: bun test
        env:
          PORT: ${{ steps.ports.outputs.web }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:${{ steps.ports.outputs.postgres }}/wio_test
          S3_ENDPOINT: http://localhost:${{ steps.ports.outputs.minio }}

      - name: Set commit status to final
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : '${{ job.status }}' === 'cancelled' ? 'error' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: state,
              context: 'CI / test (chatops)',
              description: `Finished with status: ${{ job.status }}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
  lint:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/ci'
    runs-on: self-hosted
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Get PR HEAD SHA
        id: pr
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set commit status to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: 'CI / lint (chatops)',
              description: 'Running lint...',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run lint:check

      - name: Set commit status to final
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : '${{ job.status }}' === 'cancelled' ? 'error' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: state,
              context: 'CI / lint (chatops)',
              description: `Finished with status: ${{ job.status }}`,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
