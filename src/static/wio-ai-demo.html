<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wio AI Demo</title>
  </head>

  <body>
    <h1>AI Prompt</h1>
    <textarea
      id="prompt"
      rows="4"
      cols="60"
      placeholder="Enter your prompt..."
    ></textarea>
    <br />
    <button id="send">Send</button>
    <button id="play-sound">Play Pop</button>
    <pre id="response"></pre>

    <hr />

    <h2>Modal Demo</h2>

    <wio-button modal="settings">Open</wio-button>

    <wio-modal id="settings">
      <h2>Settings</h2>
      <p>This modal is opened by the wio-button component.</p>
    </wio-modal>

    <script type="module">
      import wio from "/wio.js";

      const promptEl = document.getElementById("prompt");
      const responseEl = document.getElementById("response");
      const sendBtn = document.getElementById("send");
      const playSoundBtn = document.getElementById("play-sound");

      sendBtn.addEventListener("click", async () => {
        responseEl.textContent = "Loading...";
        try {
          const result = await wio.ask(promptEl.value);
          const html = await wio.renderMarkdown(result);
          responseEl.innerHTML = html;
        } catch (err) {
          responseEl.textContent = "Error: " + err.message;
        }
      });

      playSoundBtn.addEventListener("click", async () => {
        await wio.playSound("fart");
      });
    </script>
  </body>
</html>
