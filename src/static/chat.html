<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wio Chat Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .chat-container {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .chat-header {
        background: rgba(255, 255, 255, 0.1);
        padding: 16px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chat-header h1 {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff6b6b;
        transition: background 0.3s;
      }

      .status-dot.connected {
        background: #51cf66;
      }

      .messages {
        height: 400px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        padding: 12px 16px;
        border-radius: 12px;
        max-width: 80%;
        animation: slideIn 0.2s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.incoming {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        align-self: flex-start;
      }

      .message.outgoing {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        align-self: flex-end;
      }

      .message.system {
        background: rgba(81, 207, 102, 0.2);
        color: #51cf66;
        align-self: center;
        font-size: 13px;
        padding: 8px 16px;
      }

      .message .sender {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }

      .input-area {
        padding: 16px 20px;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        gap: 12px;
      }

      .input-area input {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
        outline: none;
      }

      .input-area input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .input-area button {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }

      .input-area button:hover {
        opacity: 0.9;
      }

      .input-area button:active {
        transform: scale(0.98);
      }

      .user-count {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div>
          <h1>💬 Wio Chat Demo</h1>
          <span class="user-count" id="userCount">0 users online</span>
        </div>
        <div class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Connecting...</span>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input
          type="text"
          id="messageInput"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script type="module">
      import wio from "/wio.js";

      const messagesEl = document.getElementById("messages");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");
      const userCountEl = document.getElementById("userCount");

      // Generate random username
      const username = "User-" + Math.random().toString(36).substring(2, 6);
      let userCount = 1;

      // Connection events
      wio.ws.onConnect(({ socketId }) => {
        statusDot.classList.add("connected");
        statusText.textContent = "Connected";
        addSystemMessage(`You joined as ${username}`);
        console.log("Connected with ID:", socketId);
      });

      wio.ws.onDisconnect(({ reason }) => {
        statusDot.classList.remove("connected");
        statusText.textContent = "Disconnected";
        addSystemMessage("Disconnected from server");
      });

      wio.ws.onReconnect(({ attempt }) => {
        statusDot.classList.add("connected");
        statusText.textContent = "Connected";
        addSystemMessage(`Reconnected after ${attempt} attempt(s)`);
      });

      wio.ws.onError(({ message }) => {
        addSystemMessage(`Error: ${message}`);
      });

      // Built-in events
      wio.ws.on("user-joined", ({ connectedCount }) => {
        userCount = connectedCount;
        updateUserCount();
        addSystemMessage("Someone joined the chat");
      });

      wio.ws.on("user-left", ({ connectedCount }) => {
        userCount = connectedCount;
        updateUserCount();
        addSystemMessage("Someone left the chat");
      });

      // Custom chat events
      wio.ws.on("chat-message", ({ sender, text }) => {
        addMessage(sender, text, "incoming");
      });

      // Send message
      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        // Show our own message
        addMessage(username, text, "outgoing");

        // Send to others
        wio.ws.emit("chat-message", { sender: username, text });

        messageInput.value = "";
      }

      sendBtn.addEventListener("click", sendMessage);
      messageInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      // Helper functions
      function addMessage(sender, text, type) {
        const msgEl = document.createElement("div");
        msgEl.className = `message ${type}`;

        if (type === "incoming") {
          const senderEl = document.createElement("div");
          senderEl.className = "sender";
          senderEl.textContent = sender;

          const textEl = document.createElement("span");
          textEl.textContent = text;

          msgEl.appendChild(senderEl);
          msgEl.appendChild(textEl);
        } else {
          msgEl.textContent = text;
        }

        messagesEl.appendChild(msgEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addSystemMessage(text) {
        const msgEl = document.createElement("div");
        msgEl.className = "message system";
        msgEl.textContent = text;
        messagesEl.appendChild(msgEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function updateUserCount() {
        userCountEl.textContent = `${userCount} user${userCount !== 1 ? "s" : ""} online`;
      }
    </script>
  </body>
</html>
