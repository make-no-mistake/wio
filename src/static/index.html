<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #ffffff;
        color: #000000;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        text-align: center;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 300;
        letter-spacing: -0.02em;
        margin-bottom: 2rem;
        line-height: 1;
      }

      p {
        font-size: clamp(1rem, 2vw, 1.25rem);
        font-weight: 300;
        line-height: 1.6;
        color: #333333;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      @media (max-width: 600px) {
        h1 {
          margin-bottom: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>wio</h1>
      <p>AI playground for companies.</p>
    </div>
  </body>
</html>
